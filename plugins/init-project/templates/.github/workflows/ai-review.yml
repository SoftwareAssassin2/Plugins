# AI code review for __SCAFFOLD_PROJECT_NAME__ — runs a Codex/GPT reviewer over each
# pull request's diff and posts the feedback as a PR comment.
#
# BEST-EFFORT / NON-FATAL by design: this is advisory, never a merge gate. When the
# reviewer secret (OPENAI_API_KEY) is absent — e.g. on a fork PR, or before anyone
# has configured it — the job WARNS and exits success. It never blocks a merge.
#
# Runs on PRs ONLY (not every push), so review minutes/tokens are spent on changes
# under review, not on intermediate branch pushes.
#
# Auth: the Codex/OpenAI token is referenced via a repo SECRET (OPENAI_API_KEY) — it
# is NEVER committed to the repo. Set it under Settings -> Secrets and variables ->
# Actions (see README.md "CI-based AI code review").
#
# Action/CLI versions are PINNED (checkout to a release SHA-tag; the Codex CLI to an
# exact npm version) — mirrors the pinning convention in ci.yml / deploy.yml.
name: AI review

on:
  pull_request:

# Least-privilege: read the diff, write PR comments only. No checks/contents write.
permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs on the same PR ref to save runner minutes/tokens.
concurrency:
  group: ai-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex-review:
    name: Codex PR review (best-effort)
    runs-on: ubuntu-latest
    steps:
      # Need the PR head + base so we can diff the actual change set.
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # NON-FATAL secret gate: with no OPENAI_API_KEY configured (fork PR, or not yet
      # set up) the reviewer can't authenticate, so WARN and end the job green. A
      # missing secret must never fail a contributor's PR.
      - name: Check for reviewer secret
        id: secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "::warning::OPENAI_API_KEY is not configured — skipping AI review (non-fatal)."
            echo "have_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.secret.outputs.have_secret == 'true'
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "22"

      # Pin the Codex CLI to an exact version (no floating @latest) — reproducibility,
      # mirroring the dev container's pinned Codex install (.devcontainer/setup.sh).
      - name: Install Codex CLI (pinned)
        if: steps.secret.outputs.have_secret == 'true'
        run: npm install -g @openai/codex@0.20.0

      # Build the PR diff (base...head) and have Codex review it. The whole step is
      # wrapped so ANY failure (CLI error, API hiccup, rate limit) WARNS and still
      # exits success — advisory review must never break the pipeline.
      - name: Run Codex review over the PR diff
        if: steps.secret.outputs.have_secret == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          if ! git diff "$BASE_SHA...$HEAD_SHA" > pr.diff; then
            echo "::warning::Could not compute PR diff — skipping AI review (non-fatal)."
            exit 0
          fi
          if [[ ! -s pr.diff ]]; then
            echo "No diff to review."
            exit 0
          fi
          prompt='You are a senior engineer reviewing the unified git diff below. Report only high-leverage correctness, security, and design issues — no style nits. Be concise. If nothing material is wrong, say so.'
          # Codex non-interactive review; never let a reviewer failure fail the job.
          if ! codex exec --skip-git-repo-check "$prompt

          $(cat pr.diff)" > review.md 2>codex.err; then
            echo "::warning::Codex review did not complete — skipping (non-fatal)."
            sed -e 's/^/codex: /' codex.err || true
            exit 0
          fi
          echo "AI_REVIEW_OK=1" >> "$GITHUB_ENV"

      # Post the review as a PR comment via the GitHub CLI (preinstalled on the
      # runner). Best-effort: a comment-post failure WARNS, never fails the job.
      - name: Post review comment
        if: steps.secret.outputs.have_secret == 'true' && env.AI_REVIEW_OK == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          {
            echo "## 🤖 AI code review (Codex, advisory)"
            echo
            cat review.md
            echo
            echo "_Advisory only — not a merge gate. Generated by \`ai-review.yml\`._"
          } > comment.md
          if ! gh pr comment "$PR_NUMBER" --body-file comment.md; then
            echo "::warning::Could not post AI review comment (non-fatal)."
          fi
