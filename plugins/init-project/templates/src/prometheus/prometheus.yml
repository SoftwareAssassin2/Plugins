# Prometheus scrape config — pulls the metrics the OTel Collector re-exposes in
# Prometheus exposition format on otel-collector:8889 (compose network DNS), and
# serves the query API that Grafana's provisioned datasource reads.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
