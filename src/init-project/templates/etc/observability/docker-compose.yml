# Observability dev-tooling stack — Grafana + an OpenTelemetry Collector.
#
# This is INTERNAL dev tooling, NOT a system component (no src/<component>/ entry)
# and NOT an external services{} dependency. It lives under etc/observability/ per
# the catch-all convention (see ../../docs/dev-container.md §3 and the root
# CLAUDE.md layout table) and is brought up/down by `./system.sh up` / `down`,
# which hardcode this file's path (it has no config.json systems[] entry).
#
# Wiring: applications send OTLP (gRPC :4317 / HTTP :4318) to the collector; the
# collector re-exposes metrics in Prometheus format on :8889, which Grafana scrapes
# via a provisioned datasource. Image tags are PINNED for reproducibility.
#
# A real bring-up happens in the dev container / CI (the dev container ships the
# docker CLI + docker-in-docker); `docker compose -f etc/observability/docker-compose.yml config`
# validates this definition without starting anything.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus exporter (scraped by Grafana)
      - "13133:13133" # health_check extension
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - otel-collector
    environment:
      # Local dev defaults only — anonymous admin access, no sign-up. This stack
      # is never exposed beyond a developer's machine / the dev container.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  grafana-storage:
